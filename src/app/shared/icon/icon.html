<div 
class="flex space-x-7">
    @if(orderCount!==0)
    { <div (click)="navigateToAllOrder()" class="cart relative cursor-pointer">

        <i class="fa-solid fa-2x fa-truck text-main cart"> </i>
        <span
            class=" absolute text-sm text-white py-1 rounded-lg px-2 bg-[#dc3545] -translate-y-1/2 translate-x-1/2 top-0 right-0">{{orderCount}}</span>
    </div>}
    @if(numOfIItems!==0)
    { <div class="cart cursor-pointer relative"
     (click)="cartIsopened=!cartIsopened;stopProg($event)"
    >

        <i 
         class="fa-solid fa-2x  fa-cart-shopping text-main"> </i>
        <span
            class=" absolute text-sm text-white py-1 rounded-lg px-2 bg-[#dc3545] -translate-y-1/2 translate-x-1/2 top-0 right-0">{{numOfIItems}}</span>
    </div>}
    @if(numOfWishListItems!==0)
    { <div (click)="navigateToWislist()"
        class="cart relative cursor-pointer">

        <i class="fa-solid fa-heart fa-2x text-main"> </i>
        <span
            class=" absolute text-sm text-white py-1 rounded-lg px-2 bg-[#dc3545] -translate-y-1/2 translate-x-1/2 top-0 right-0">{{numOfWishListItems}}</span>
    </div>}

</div>
@if(cartIsopened)
{
      <div 
    class="fixed inset-0 "
    (click)="cartIsopened=false">
  </div>
    <div (click)="stopProg($event)"
     class="fixed z-40 w-[55%]   scroll-auto rounded-lg right-1/5 overflow-y-auto border border-gray-300 h-[450px] bg-[#ffffff]">
    <div class="flex justify-between py-9 px-6 items-center border-b border-gray-300 shadow-lg">
        <h3 class="text-main font-bold">Cart Items:</h3>
        <button type="button" (click)="navigateToCart()"
            class="text-white bg-main box-border border border-transparent hover:bg-[#11bd11]! transition-all duration-300  rounded-md cursor-pointer shadow-xs font-medium rounded-base py-2 px-5  ">
            Open cart <i class="fa-solid fa-2x fa-cart-shopping text-[#FFC107]"></i>
            </button>
    </div>
    <div class="px-3  rounded-lg  mb-5">
        <app-cart></app-cart>
    </div>
</div>
}
