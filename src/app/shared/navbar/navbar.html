<nav [class.bg-[#f8f9fa]]="!isLogged" [class.border-gray-200]="!isLogged" [class.shadow-xl]="isLogged"
    [class.border-[#ebeeed]]="isLogged" [class.bg-[#f0f3f2]]="isLogged" class="border-t-2  border-gray-200">
    <div class="max-w-6xl mx-auto ">

        <div [class.py-6]="!flag" [class.py-1]="flag"
            class="flex flex-wrap w-full  items-center justify-between mx-auto ">
            @if(!isLogged){ <a href="#" class="flex items-center space-x-3 rtl:space-x-reverse">
                <img src="assets/dashboard/freshcart-logo.svg" class="h-8" alt="Logo" />

            </a>
            <button data-collapse-toggle="navbar-default" type="button"
                class="inline-flex items-center p-2 cursor-pointer w-10 h-10 justify-center text-sm text-gray-500 rounded-lg md:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200"
                aria-controls="navbar-default" aria-expanded="false">
                <span class="sr-only">Open main menu</span>
                <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 17 14">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M1 1h15M1 7h15M1 13h15" />
                </svg>
            </button>
            }
            <div [class.px-1]="isLogged" class="hidden w-full transition-all duration-300 md:flex grow md:w-auto"
                id="navbar-default">
                <ul [class.[bg-#f8f9fa]]="!isLogged" [class.bg-[#f0f3f2]]="isLogged"
                    class="font-medium justify-between flex grow flex-col p-4 md:p-0 mt-4 border border-gray-100 rounded-lg  md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0 ">
                    @if(isLogged){
                    <ul [class.bg-[#f0f3f2]]="isLogged"
                        class="font-medium justify-between flex flex-col p-4 md:p-0 mt-4 border border-gray-100 rounded-lg  md:flex-row md:space-x-1 rtl:space-x-reverse md:mt-0 md:border-0">
                        <li class="cursor-pointer">
                            <a routerLink="/home" routerLinkActive=" bg-[#0aad0a] text-white  md:hover:text-white "
                                class="block cursor-pointer py-2 px-3 text-[#545554] rounded-sm md:border-0  md:hover:text-black md:p-2"
                                aria-current="page">Home</a>
                        </li>
                        <li class="cursor-pointer">
                            <a routerLink="cart" routerLinkActive=" bg-[#0aad0a] text-white  md:hover:text-white "
                                class="block cursor-pointer py-2 px-3 text-[#545554] rounded-sm md:border-0  md:hover:text-black md:p-2"
                                aria-current="page">Cart</a>
                        </li>
                        <li class="cursor-pointer">
                            <a routerLink="products" routerLinkActive=" bg-[#0aad0a] text-white  md:hover:text-white "
                                class="block cursor-pointer py-2 px-3 text-[#545554] rounded-sm md:border-0  md:hover:text-black md:p-2"
                                aria-current="page">Products</a>
                        </li>
                        <li>
                            <a routerLink="brands" routerLinkActive=" bg-[#0aad0a] text-white  md:hover:text-white "
                                class="block cursor-pointer py-2 px-3 text-[#545554] rounded-sm md:border-0  md:hover:text-black md:p-2"
                                aria-current="page">Brands</a>
                        </li>
                        <li class="cursor-pointer">
                            <a routerLink="categories" routerLinkActive=" bg-[#0aad0a] text-white  md:hover:text-white "
                                class="block cursor-pointer py-2 px-3 text-[#545554] rounded-sm md:border-0  md:hover:text-black md:p-2"
                                aria-current="page">
                                Categories </a>
                        </li>

                        <div (click)="stopProg($event)" class=" flex justify-center">
                            <button (click)=" navigate()" [class.bg-[#7dd07e]]="!search" [class.bg-[#0aad0a]]="search"
                                [class.hover:bg-[#11bd11]]="search"
                                class="inline-flex items-center justify-center  duration-300 transition-all cursor-pointer shrink-0 text-white hover:bg-[#11bd11]   shadow-xs rounded-md w-15 h-10 ">
                                <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24"
                                    height="24" fill="none" viewBox="0 0 24 24">
                                    <path stroke="currentColor" stroke-linecap="round" stroke-width="2"
                                        d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
                                </svg>
                                <span class="sr-only">Icon description</span>
                            </button>
                            <label for="simple-search" class="sr-only">Search</label>
                            <div class="relative w-full">
                                <div class=" absolute inset-y-0 end-0 flex items-center pe-3 cursor-pointer">
                                    <i [class.hidden!]="xMark" (click)="clearSearch()"
                                        class="fa-solid fa-xmark text-[#21313c]"></i>
                                </div>
                                <input (focus)="onFocus($event);xMark=false" (blur)="onBlur($event);xMark=true"
                                    type="text" id="simple-search" #inputOfSearch (keyup)="searchForProduct()"
                                    class="pe-10 w-[50%]   bg-transparent transition-all duration-300 focus:w-full py-2.5 border-[#0aad0a]  focus:border-[#0aad0a]  rounded-md ps-auto  text-sm  block "
                                    placeholder="Search All Site Products .. " required />
                            </div>
                        </div>

                    </ul>

                    }
                    <ul [class.space-x-2]="!isLogged" [class.space-x-4]="isLogged"
                        class="flex items-center justify-end grow">
                        @if(flag)
                        {<li>
                            <a href=""><i class="fab text-[#575757] fa-instagram"></i></a>
                        </li>
                        <li>
                            <a href=""><i class="fab text-[#575757] fa-facebook"></i></a>
                        </li>
                        <li>
                            <a href=""><i class="fab text-[#575757] fa-tiktok"></i></a>
                        </li>
                        <li>
                            <a href=""><i class="fab text-[#575757] fa-twitter"></i></a>
                        </li>
                        <li>
                            <a href=""><i class="fab text-[#575757] fa-linkedin"></i></a>
                        </li>
                        <li>
                            <a href=""><i class="fab text-[#575757] fa-youtube"></i></a>
                        </li>
                        }
                        @else {
                        @if(isLogged){
                        <li><app-icon></app-icon></li>
                        }

                        }
                    </ul>
                    @if(!isLogged){
                    <li>

                        <a routerLink="login"
                            class="block py-2 px-3 text-gray-900 rounded-sm hover:bg-white md:hover:bg-transparent md:border-0  md:p-0">Login</a>
                    </li>
                    <li>
                        <a routerLink="register"
                            class="block py-2 px-3 text-gray-900 rounded-sm hover:bg-white md:hover:bg-transparent md:border-0  md:p-0">Register</a>
                    </li>
                    }

                </ul>
            </div>
            @if(isLogged)
           { <div class="flex w-full mx-auto justify-between items-center space-x-3">
                <div class="w-1/3">
                    <button data-collapse-toggle="navbar-default" type="button"
                        class="inline-flex items-center p-2 cursor-pointer w-10 h-10 justify-center text-sm text-gray-500 rounded-lg md:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200"
                        aria-controls="navbar-default" aria-expanded="false">
                        <span class="sr-only">Open main menu</span>
                        <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 17 14">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M1 1h15M1 7h15M1 13h15" />
                        </svg>
                    </button>
                </div>
                   @if(!flag)
               {  <app-icon class="md:hidden block"></app-icon>}
                <div
                    class="md:hidden flex ms-3 bg-[#bdbdbd] hover:bg-[#0aad0a] transition-all duration-300 items-center cursor-pointer px-2 py-1 rounded-2xl">
                
                    <button type="button" class="flex text-sm space-x-2.5 items-center cursor-pointer rounded-full"
                        id="user-menu-button" aria-expanded="false" data-dropdown-toggle="user-dropdown-nav"
                        data-dropdown-placement="bottom-start">
                        <span class="sr-only">Open user menu</span>
                        <p class=" w-10 h-10 bg-[#f0f3f2] rounded-full cursor-pointer flex items-center justify-center">

                            <i class="fa-solid text-lg fa-user text-main"></i>
                        </p>
                        <h4 class="text-white font-semibold cursor-pointer">{{userName}}</h4>
                    </button>

                    <!-- Dropdown menu -->
                    <div class="z-50 hidden py-5 bg-white border cursor-auto border-gray-200 rounded-lg shadow-lg w-44"
                        id="user-dropdown-nav">

                        <ul class=" text-sm text-center m-auto font-medium text-gray-700"
                            aria-labelledby="user-menu-button">
                            <li (click)="goToSettings()">
                                <button type="button" routerLink="/settings"
                                    class="text-white transition-all duration-300 bg-[#212529] hover:bg-[#353a3e] box-border border border-transparent hover:bg-brand-strong shadow-xs font-semibold leading-5 cursor-pointer rounded-md mb-2 text-md px-6 py-2 focus:outline-none">
                                    Settings</button>
                            </li>

                            <li>
                                <button type="button" (click)="deleteToken()"
                                    class="text-white transition-all duration-300 bg-[#ffc107] hover:bg-[#ffca2c] box-border border border-transparent hover:bg-brand-strong shadow-xs font-semibold leading-5 cursor-pointer rounded-md text-md px-6 py-2 focus:outline-none">
                                    SignOut</button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>}
        </div>

        <div (click)="stopProg($event)" [class.mt-6]="flag" class=" relative flex justify-end ">
            <app-searchlist [search]="search" [class.hidden]="!isSearchFocused"></app-searchlist>

        </div>
    </div>
</nav>
