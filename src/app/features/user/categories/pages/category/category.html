<section class=" md:mt-14 mt-5
md:max-w-6xl  sm:max-w-[80%]
bg-[#f0f3f2]
mb-5
mx-auto
rounded-lg
p-12
">
    <div class="grid gap-x-4 grid-cols-12">
        <div class="md:col-span-2  col-span-12">
            <img class="w-full rounded-xl p-2" [src]="categoryItems.image" alt="" srcset="">
        </div>
        <div class="col-span-9 md:mb-0 mb-5">
            <div class="flex  w-full h-full flex-col justify-between ">
                <div>
                    <h2 class="text-2xl text-[#21252f] font-bold mb-2">Category Name:</h2>
                    <h3 class="text-xl text-[#21252f] font-bold mb-2">{{categoryItems.name}}</h3>
                    <h4 class="text-md text-main font-semibold ">{{categoryItems.slug}}</h4>
                </div>
                <div class="w-full">
                    <p class="text-[#212529] font-semibold text-md ">Total Products:</p>
                    <p class="text-[#212529] text-md "><span class="font-semibold me-1">Last
                            Update:</span>{{categoryItems.updatedAt|date:'medium' }} </p>
                </div>
            </div>
        </div>
    </div>
    <app-filter [brandItems]="productList|categoryPipe:categoryId!"></app-filter>
</section>
