<div class="md:max-w-6xl  sm:max-w-[80%]  max-w-96 md:mt-14 mt-6 mx-auto  p-5">
<h2 class="text-3xl text-[#212529] font-semibold mb-5">All Categories</h2>

<div class="grid grid-cols-12">
    @for (category of categriesList; track category._id) {
    <div (click)="navigate(category._id)"
     class="md:col-span-3 sm:col-span-6 col-span-12  p-5">
        <div class="cursor-pointer border-5 rounded-lg ease-out transition-all duration-700 border-transparent hover:border-[#0aad0a] p-5">
            <figure class=" mb-3 border-b py-5 border-[#c7c8c9]">
                <img [src]="category.image" class="rounded-lg w-60 h-60" alt="">
            </figure>
            <p class="text-xl font-semibold text-[#22262a]">{{category.name}}</p>
            <p class="lowercase text-main font-semibold">{{category.name}}</p>
        </div>
    </div>}
</div>
</div>
