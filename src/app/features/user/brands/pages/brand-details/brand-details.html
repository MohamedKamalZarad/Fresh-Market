<section
class=" md:mt-14 mt-5
md:max-w-6xl  sm:max-w-[80%] 
bg-[#f0f3f2]
mb-5
mx-auto
rounded-lg
p-12
">
<div class="grid gap-x-4 grid-cols-12">
<div class="md:col-span-2  col-span-12">
    <img class="w-full rounded-lg p-2" [src]="brandItems.image" alt="" srcset="">
</div>
<div class="col-span-9 md:mb-0 mb-5">
    <h2 class="text-2xl text-[#21252f] font-bold mb-2">Category Name:</h2>
    <h3 class="text-xl text-[#21252f] font-bold md:mb-2">{{brandItems.name}}</h3>
    <h4 class="text-md text-main font-semibold md:mb-0 mb-4">{{brandItems.slug}}</h4>
    <p class="text-[#212529] font-semibold text-md ">Total Products:</p>
    <p class="text-[#212529] text-md "><span class="font-semibold">Last Update:</span>{{brandItems.updatedAt|date:'medium' }} </p>
    
</div>
</div>
<app-filter
[brandItems]="productList|brandpipe:brandId!"
></app-filter>
</section>
