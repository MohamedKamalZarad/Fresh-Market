<section>
    <div class="max-w-6xl   mx-auto mt-7">
        <div class="mb-7">
            <div class="md:flex justify-between items-center">
                <h2 class="text-3xl text-[#212529] md:w-[75%] font-bold mb-5">Shop Popular Products</h2>
                <div class="md:w-[25%] flex justify-center">
                    <button
                        class="inline-flex items-center justify-center bg-[#0aad0a] duration-300 transition-all cursor-pointer shrink-0 text-white hover:bg-[#11bd11]   shadow-xs rounded-md w-15 h-10 ">
                        <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24"
                            height="24" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-width="2"
                                d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
                        </svg>
                        <span class="sr-only">Icon description</span>
                    </button>
                    <label for="simple-search" class="sr-only">Search</label>
                    <div class="relative  w-full">

                        <input type="text" id="simple-search" #inputOfSearch (keyup)=" searchForProduct()"
                            class="pe-9 py-2.5 focus:border-0  border-0 rounded-md ps-auto  text-sm  block w-full"
                            placeholder="Search..." required />
                    </div>
                </div>
            </div>

            <div class="hidden md:flex items-center justify-end ">


                <div class="flex">
                    <button (click)="gridChange() ;toggleDisabled()"
                     class="text-[#212529] cursor-pointer 
                          disabled:text-[#696d6f] 
                              disabled:cursor-default!" [disabled]="isDisabledBtn">

                        <i class="fa-solid fa-bars fa-2x "></i>
                    </button>
                    <button (click)="  gridChange() ;toggleDisabled()"
                     class="text-[#212529] cursor-pointer 
                          disabled:text-[#696d6f] 
                                 disabled:cursor-default!" [disabled]="!isDisabledBtn">

                        <i class="fa-solid fa-table-cells fa-2x "></i></button>
                </div>

            </div>
        </div>



        <div class="row grid grid-cols-12 mb-5">


            @if(!isloading) {
            @for (product of productList| searchPipe : search | offer : 20 | slice : 10 : 18 ; track product._id) {

            <div [class.md:col-span-3!]="flag" [class.col-span-12]="flag"  [class.md:col-span-12]="!flag"
                class=" p-6 w-full cursor-pointer sm:col-span-6  group group/card  transition-all duration-300 overflow-hidden  relative  shadow-sm shadow-gray-300  bg-white ">
                <app-product [userWishListIds]="userWishListIds" [flag]="flag" [product]="product"></app-product>
                <p class="absolute top-0 translate-y-2 -translate-x-2 right-0 z-10">
                    <app-offer>{{'-'+product.offerNumber+'%'}}</app-offer>
                </p>
            </div>} }
            @if(isloading){
            @for(skeleton of [].constructor(8);track $index){
            <div
                class="md:col-span-3 col-span-12 p-6 w-full cursor-pointer group group/card  transition-all duration-300 overflow-hidden  relative  shadow-sm shadow-gray-300  bg-white ">
                 <div
                        class="p-6 w-full cursor-pointer group transition-all duration-300 overflow-hidden relative shadow-sm shadow-gray-300 bg-white animate-pulse">
                        <figure class="mb-3 relative border-b border-gray-300">
                            <div class="w-full h-48 bg-[#6c757d] rounded-lg mb-6"></div>
                        </figure>

                        <div class="space-y-3">
                            <div class="h-4 bg-[#c2c3c4] rounded w-1/3"></div>
                            <div class="h-5 bg-[#c2c3c4] rounded w-2/3"></div>
                            <div class="h-3 bg-[#c2c3c4] rounded w-1/4 line-through"></div>
                            <div class="flex justify-between items-center mt-2">
                                <div class="h-5 bg-[#c2c3c4] rounded w-1/4"></div>
                                <div class="flex space-x-2 items-center">
                                    <div class="h-5 w-5 bg-[#c2c3c4] rounded-full"></div>
                                    <div class="h-4 bg-[#c2c3c4] rounded w-8"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="btn-container justify-between py-3 grid grid-cols-12 gap-3 mt-4">
                            <div class="h-10 bg-[#84d684] rounded col-span-9"></div>
                            <div class="h-10 bg-[#84d684] rounded col-span-3"></div>
                        </div>
                    </div>

            </div>}}



        </div>
    </div>
</section>
