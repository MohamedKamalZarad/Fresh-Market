<section class="py-10">
  <div class="container mx-auto flex max-w-6xl justify-center">
    <div class="wrapper bg-white shadow-md rounded-lg max-w-4xl p-8 w-full ">
      <h2 class="text-3xl text-center font-semibold text-[#212529] mb-5">
        Register Now <i class="fa-solid fa-user-plus"></i>
      </h2>
      <form [formGroup]="registerForm" class="max-w-3xl w-full mx-auto" (ngSubmit)="onSubmit()">

        <div class="mb-5">
          <div class="mb-5">
            <app-input [type]="'text'" [id]="'base-input'" [control]="registerForm.get('name') ">
              Name:</app-input>
          </div>
        </div>

        <div class="mb-5">
          <app-input [type]="'email'" [id]="'email'" [control]="registerForm.get('email')">
            Email:</app-input>
        </div>

        <div class="mb-5">
          <app-input [type]="'password'" [id]="'password'" [control]="registerForm.get('password') ">
            Password:</app-input>
        </div>

        <div class="mb-5">
          <app-input [type]="'password'" [id]="'rePassword'" [control]="registerForm.get('rePassword')">
            Repeat password:</app-input>
        </div>

        <div class="mb-5">
          <app-input [type]="'tel'" [id]="'phone'" [control]="registerForm.get('phone') ">
            Phone:</app-input>
        </div>
        <div class="flex items-start mb-5">
          <div class="flex items-center h-5">
            <input id="terms" type="checkbox" formControlName="agreeWithTerms" (change)="onChange()"
              class="w-4 h-4 border cursor-pointer border-gray-300 rounded-sm bg-gray-50 focus:ring-3 focus:ring-blue-300"
              required>
          </div>
          <label for="terms" class="ms-2 text-sm font-medium text-[#212529]">
            I agree with the
            <a href="#" class="text-main underline cursor-pointer">terms and conditions</a>
          </label>
        </div>
        <div class="w-full mb-7">
          <app-button [isLoading]="isLoading" [isValid]="registerForm.valid " [isINValid]="registerForm.invalid">
            Register
          </app-button>
        </div>



        <div class="flex justify-center">
          <p class="text-sm text-[#212529]">
            Already have an account?
            <a routerLink="/login" class="text-main underline cursor-pointer ms-1">Login Now</a>
          </p>
        </div>
        @if(inValidReq){
        <p class="text-red-500 w-75/100 border border-red-300 mx-auto mt-6 p-5 rounded-lg text-center bg-red-200
        transition-all duration-500 ease-in-out transform -translate-y-2">
        {{errMessage}}
        </p>
        }
      </form>
    </div>
  </div>
</section>
