<form [formGroup]="resetPasswordForm" (ngSubmit)="onclick()">


    <h2 class="text-[#55595c] mb-3 py-5 font-semibold text-center text-3xl">Reset Your Password</h2>
    <p class="text-[#676b6d] font-bold mb-5">Please use strong password</p>

    <div class=" mb-5 rounded-md">



        <div class="bg-[#f8f9fa] p-6 mb-5">
            <label for="id" class=" flex justify-between text-md text-[#474a4e]  mb-2 font-bold ">
                <span class="me-auto">New Password </span>
                <div class="flex justify-end mb-4">

                    @if(resetPasswordForm.get("newPassword")?.getError("required")&&resetPasswordForm.get("newPassword")?.touched){

                    <p class="text-[#df4957] font-bold">
                        Required

                    </p>
                    }
                    @if(resetPasswordForm.get("newPassword")?.getError("pattern")&&resetPasswordForm.get("newPassword")?.touched){
                    <p class="text-[#df4957] font-bold ">
                        Invalid password format

                    </p>}
                    @if(resetPasswordForm.get("newPassword")?.touched&&resetPasswordForm.get("newPassword")?.valid){


                    <i class="fa-solid my-auto text-xs text-green-600 fa-check"></i>

                    }
                </div>
            </label>
            <input formControlName="newPassword" type="password" id="newPassword" class="border border-gray-300  text-sm rounded-lg 
            block w-full p-2.5" placeholder="Aa000000" required />
        </div>
        <div class="bg-[#f8f9fa] p-6 mb-5">
            <label for="rePassword" class=" flex justify-between text-md mb-2 text-[#474a4e] font-bold ">
                rePassword
                @if(resetPasswordForm.get("rePassword")?.getError("required")&&resetPasswordForm.get("rePassword")?.touched){
    
                <p class="text-[#df4957] font-bold">
                    Required
    
                </p>
                }
                @if(resetPasswordForm.getError("misMatch") &&resetPasswordForm.get("rePassword")?.touched&&!resetPasswordForm.get("rePassword")?.getError("required")){
                <p class="text-[#df4957] font-bold ">
                    Password must match
    
                </p>}
                @if(resetPasswordForm.get("rePassword")?.touched&&!resetPasswordForm.getError("misMatch")&&resetPasswordForm.get("rePassword")?.valid){
    
    
                <i class="fa-solid my-auto text-xs text-green-600 fa-check"></i>
    
                }
                
            </label>
            <input formControlName="rePassword" type="password" id="rePassword" class=" border border-gray-300  text-sm rounded-lg 
            block w-full p-2.5" placeholder="Aa000000" required />
        </div>
    </div>
    <div class="btn-container flex justify-end mb-2">

        <app-button [isLoading]="isLoading" [isValid]="resetPasswordForm.valid" [isINValid]="resetPasswordForm.invalid">Submit</app-button>
    </div>


</form>
